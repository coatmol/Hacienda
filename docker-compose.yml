services:
  # Batch pipeline — reads /input/tasks.json, writes /output/results.json
  app:
    build:
      context: .
    image: hacienda
    env_file:
      - .env
    volumes:
      - .:/app

  # Demo web app — interactive UI at http://localhost:8080
  demo:
    build:
      context: .
    image: hacienda
    env_file:
      - .env
    environment:
      - HACIENDA_MODE=demo
    ports:
      - "8080:8080"
    volumes:
      - .:/app