<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hacienda — AI-powered video captioning agent. Generate four stylistically distinct captions from any video clip." />
    <title>Hacienda // Video Captioning Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link href="index.css" rel="stylesheet" />
    <script src="config.js" defer></script>
    <script src="index.js" defer></script>
  </head>
  <body>
    <div class="wrap">
      <!-- Header -->
      <header>
        <div class="logo-mark">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7l10 5 10-5-10-5z" fill="#fce205" opacity="0.8"/>
            <path d="M2 17l10 5 10-5" stroke="#fce205" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12l10 5 10-5" stroke="#00f0ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1>Hacienda</h1>
        <p class="tagline">AI-powered video captioning — four voices, one source</p>
        <div class="header-actions">
          <div class="health-badge" id="healthBadge" title="Checking status…">
            <span class="health-dot"></span>
            <span class="health-text">Detecting…</span>
          </div>
          <button class="settings-btn" id="settingsBtn" onclick="toggleSettings()" title="API Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Settings Panel (collapsed by default) -->
      <div class="settings-panel" id="settingsPanel">
        <div class="settings-title">API Configuration</div>
        <p class="settings-desc">Enter your Gemma proxy credentials. Saved in your browser only.</p>
        <label class="settings-label" for="cfgBaseUrl">Gemma Base URL</label>
        <input type="text" id="cfgBaseUrl" class="settings-input" placeholder="https://your-proxy.example/v1" />
        <label class="settings-label" for="cfgToken">Gemma Token</label>
        <input type="password" id="cfgToken" class="settings-input" placeholder="Bearer token" />
        <label class="settings-label" for="cfgModel">Model Name</label>
        <input type="text" id="cfgModel" class="settings-input" placeholder="gemma" />
        <button class="settings-save-btn" onclick="saveSettings()">Save</button>
      </div>

      <!-- Keyframe strip (decorative scanner) -->
      <div class="keyframe-strip" id="kfStrip"></div>

      <!-- Mode tabs -->
      <div class="tabs">
        <button class="tab active" data-mode="url" id="tabUrl" onclick="setMode('url')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
          URL
        </button>
        <button class="tab" data-mode="file" id="tabFile" onclick="setMode('file')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload
        </button>
      </div>

      <!-- Clip input rows -->
      <div id="clipRows"></div>
      <button class="add-row-btn" id="addRowBtn" onclick="addRow()">+ Add another clip</button>

      <!-- Generate button -->
      <button class="generate-btn" id="generateBtn" onclick="generateAll()">
        <span class="btn-text">Generate Captions</span>
        <span class="btn-loader" id="btnLoader"></span>
      </button>

      <!-- Status -->
      <div class="status-bar" id="statusBar">
        <div class="status-text" id="status"></div>
        <div class="status-timer" id="statusTimer"></div>
      </div>

      <!-- Results -->
      <div id="results"></div>
    </div>
  </body>
</html>
